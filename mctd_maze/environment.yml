name: mctd_maze
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch=2.5.*
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1   # pytorch-cuda 已包含 CUDA runtime，不要再加 cudatoolkit
  - "numpy>=1.24,<2"
  - scipy>=1.10
  - tqdm>=4.65
  - pyyaml>=6.0
  - pip:
    - mujoco>=3.1.0
    - ogbench>=1.0.0
    - einops>=0.7.0
    - hydra-core>=1.3.2
    - omegaconf>=2.3.0
    - wandb>=0.17.0
    - loguru>=0.7.0
    - gymnasium>=0.29.0
    - stable-baselines3>=2.0.0
    - pytest>=7.4.0
    - black>=23.0.0
    - isort>=5.12.0
